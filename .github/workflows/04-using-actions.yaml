name: 04 - Using-Actions

on: 
   workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
          run: 
            working-directory: 04-using-actions/react-app
        
        steps:
        - name: Checkout code
          uses: actions/checkout@v6 
        - name: Printing Folders
          run: ls -la

        - name: echo test
          run: hello tests  
          
        - name: Setup Node
          uses: actions/setup-node@v6
          with:
            node-version: 24

        - name: Install Dependencies
          run: npm ci

        - name: Run Unit Tests 
          run: npm run test