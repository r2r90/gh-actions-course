name: 04 -Using-Actions

on: 
    push

jobs:
    build:
        runs-on: ubuntu-latest
        
        steps:
        - name: Checkout code
          uses: actions/checkout@v6

        # - name: Printing Folders
        #   run: ls -la
          
        - name: Setup Node
          uses: actions/setup-node@v6
          with:
            node-version: 24
        - name: Install Dependencies
          working-directory: 04-using-actions/react-app
          run: npm ci
