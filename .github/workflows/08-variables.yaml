name: 08 - Using Variables

on:
    # push:
    workflow_dispatch:

env:
    WORKFLOW_VAR: "I am a workflow env variable"
    OVERWRITTEN_VAR: "I will be overwritten"

jobs:
    echo:
        runs-on: ubuntu-latest
        env:
            JOB_VAR: "I am a job env var"
            OVERWRITTEN_VAR: "I have been overwritten at the job level"

        steps:
            - name: Print Env Variables
              env:
                  STEP_VAR: "I am a step env var"
                  step_var_2: "I am another step var"
              run: |
                    echo "Step env var: $STEP_VAR"
                    echo "Step env var 2: $step_var_2"
                    echo "Job env var: $JOB_VAR"
                    echo "Workflow env var: $WORKFLOW_VAR"  
                    echo "Overwritten var: $OVERWRITTEN_VAR"
            
            - name: Overwrite Job Variable
              env:
                   OVERWRITTEN_VAR: "I have been overwritten at the step level"
              run: echo "Step env var $OVERWRITTEN_VAR"
